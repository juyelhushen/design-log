server:
  port: 8080

spring:
  application:
    name: newsletter
  datasource:
    url: jdbc:postgresql://localhost:5432/designlog
    username: postgres
    password: ${DB_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false


app:
  jwt:
    issuer: newsletter-app
    access-token-ttl: 15m
    refresh-token-ttl: 7d
    public-key: ${PUBLIC_KEY}
    private-key: ${PRIVATE_KEY}
  frontend-redirect-url: http://localhost:3000/auth/success


